<meta name="robots" content="index,follow">
<meta property="og:title" content="Bạn có đang âm thầm loãng xương & mất cơ? — Bài kiểm tra 2 phút">
<meta property="og:description" content="Trả lời 11 câu để biết mức nguy cơ và nên bắt đầu làm gì. Bác sĩ Chúc gửi nhận xét riêng qua email.">

<style>
  html,body{margin:0;padding:0}
  body{background:#eef4f3;background:linear-gradient(180deg,#eef4f3 0%,#f7fbfa 100%);
    min-height:100vh;padding:28px 14px 44px;
    font-family:'Be Vietnam Pro',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  .lxq-brand{max-width:600px;margin:0 auto 16px;text-align:center;color:#0f766e;font-weight:800;
    font-size:15px;letter-spacing:.02em;display:flex;align-items:center;justify-content:center;gap:8px}
  .lxq-foot{max-width:600px;margin:22px auto 0;text-align:center;color:#94a3b8;font-size:12.5px;line-height:1.5}
  .lxq-foot a{color:#0f766e;text-decoration:none}
</style>
</head>
<body>
  <div class="lxq-brand">🩺 Bác sĩ Nguyễn Xuân Chúc</div>
<div id="lxq-root">
<style>
@import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap');
#lxq-root{--teal:#0f766e;--teal-d:#0b5750;--teal-l:#e6f4f1;--ink:#1f2937;--muted:#6b7280;
  --line:#e5e7eb;--bg:#ffffff;--radius:16px;--maxw:600px;
  font-family:'Be Vietnam Pro',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  color:var(--ink);line-height:1.55;max-width:var(--maxw);margin:0 auto;padding:0 4px;-webkit-font-smoothing:antialiased;}
#lxq-root *{box-sizing:border-box;}
.lxq-card{background:var(--bg);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:0 10px 30px -12px rgba(15,118,110,.25);overflow:hidden;}
.lxq-bar{height:7px;background:#fde2e4;}
.lxq-bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,#fb7185,#e11d48);border-radius:0 7px 7px 0;box-shadow:0 0 8px rgba(225,29,72,.45);transition:width .35s ease;}
.lxq-body{padding:26px 22px 24px;}
.lxq-eyebrow{color:var(--teal);font-weight:700;font-size:13px;letter-spacing:.04em;text-transform:uppercase;margin:0 0 8px;}
.lxq-h1{font-size:23px;line-height:1.3;font-weight:800;margin:0 0 10px;}
.lxq-lead{color:var(--muted);font-size:15px;margin:0 0 20px;}
.lxq-q{font-size:19px;font-weight:700;margin:2px 0 4px;}
.lxq-hint{color:var(--muted);font-size:13.5px;margin:0 0 16px;}
.lxq-opts{display:flex;flex-direction:column;gap:10px;margin-top:6px;}
.lxq-opt{display:flex;align-items:center;gap:12px;border:1.5px solid var(--line);border-radius:12px;
  padding:14px 15px;cursor:pointer;font-size:15.5px;transition:.15s;background:#fff;}
.lxq-opt:hover{border-color:var(--teal);background:#fafffe;}
.lxq-opt.on{border-color:var(--teal);background:var(--teal-l);box-shadow:inset 0 0 0 1px var(--teal);}
.lxq-opt input{width:20px;height:20px;accent-color:var(--teal);flex:0 0 auto;margin:0;}
.lxq-field{margin-bottom:14px;}
.lxq-field label{display:block;font-weight:600;font-size:15px;margin-bottom:6px;}
.lxq-field input{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;font-size:16px;outline:none;transition:.15s;}
.lxq-field input:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-l);}
.lxq-err{color:#dc2626;font-size:13px;margin-top:5px;display:none;}
.lxq-field.bad input{border-color:#dc2626;}
.lxq-field.bad .lxq-err{display:block;}
.lxq-nav{display:flex;gap:10px;margin-top:22px;}
.lxq-btn{flex:1;border:0;border-radius:12px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;transition:.15s;font-family:inherit;}
.lxq-btn.primary{background:var(--teal);color:#fff;}
.lxq-btn.primary:hover{background:var(--teal-d);}
.lxq-btn.ghost{flex:0 0 auto;background:#f3f4f6;color:var(--ink);padding:15px 20px;}
.lxq-btn:disabled{opacity:.45;cursor:not-allowed;}
.lxq-trust{display:flex;align-items:flex-start;gap:8px;color:var(--muted);font-size:12.5px;margin-top:16px;}
.lxq-trust svg{flex:0 0 auto;margin-top:1px;}
/* result */
.lxq-badge{display:inline-block;font-weight:800;font-size:15px;padding:7px 16px;border-radius:999px;margin-bottom:6px;}
.lxq-gauge{font-size:44px;font-weight:800;line-height:1;margin:6px 0 2px;}
.lxq-result-note{background:#f9fafb;border:1px solid var(--line);border-radius:12px;padding:16px;margin:18px 0;font-size:15px;}
.lxq-cta{display:block;text-align:center;background:var(--teal);color:#fff;text-decoration:none;font-weight:700;
  border-radius:12px;padding:15px;margin-top:6px;font-size:16px;}
.lxq-spin{display:inline-block;width:18px;height:18px;border:3px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:lxq-rot .7s linear infinite;vertical-align:-3px;margin-right:8px;}
@keyframes lxq-rot{to{transform:rotate(360deg)}}
.lxq-author{display:flex;align-items:center;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--line);font-size:13px;color:var(--muted);}
.lxq-author b{color:var(--ink);}
/* bộ chọn dấu T-score (chống quên dấu trừ) */
.lxq-sign{display:flex;gap:10px;margin:0 0 12px;}
.lxq-sign button{flex:1;border:1.5px solid var(--line);border-radius:12px;background:#fff;padding:12px 8px;
  font-size:15px;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit;color:var(--ink);}
.lxq-sign button:hover{border-color:var(--teal);}
.lxq-sign button.on{border-color:var(--teal);background:var(--teal-l);box-shadow:inset 0 0 0 1px var(--teal);}
.lxq-sign button b{font-size:19px;}
@media(max-width:480px){.lxq-body{padding:22px 16px}.lxq-h1{font-size:20px}.lxq-q{font-size:17.5px}}
</style>

<div class="lxq-card">
  <div class="lxq-bar"><i id="lxqProg"></i></div>
  <div class="lxq-body" id="lxqBody"><!-- render bằng JS --></div>
</div>

<script>
(function(){
  "use strict";
  /* ========= CẤU HÌNH — SỬA 2 DÒNG NÀY ========= */
  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyqBN8bSJzrrPHg-8k2BKImV03byg_6Hgo7LntKjlkn9v7UTbGd7JH7k5OBWs5_jTEFMw/exec';   // URL .../exec của Apps Script
  var SECRET     = 'xuong-drchuc-2026';        // trùng SECRET trong file .gs
  var CTA_URL    = 'https://drchuc.com/sarcopenia-la-gi/';  // bài blog mất cơ (nút sau khi xong)
  /* ============================================= */

  // Tiêu đề câu hỏi = KHÓA gửi về Sheet (phải trùng file .gs)
  var T = {
    ten:'Họ và tên của bạn', email:'Email của bạn', sdt:'Số điện thoại / Zalo',
    tuoi:'Bạn (hoặc người được kiểm tra) bao nhiêu tuổi?', gioi:'Giới tính?',
    mankinh:'(Dành cho nữ) Bạn đã mãn kinh chưa?', cannang:'Cân nặng hiện tại của bạn (kg)?',
    chieucao:'So với thời trẻ, chiều cao có bị thấp đi rõ (trên 3cm) hoặc lưng còng hơn không?',
    gaytxuong:'Bạn đã từng gãy xương sau một cú ngã hoặc va chạm nhẹ chưa?',
    bome:'Bố hoặc mẹ của bạn có từng bị gãy xương hông (háng) không?',
    yeuto:'Bạn có các yếu tố nguy cơ nào sau đây?',
    tapluyen:'Mỗi tuần bạn tập kháng lực (tạ, dây, squat, hít đất…) mấy buổi?',
    sarcf:'Trong sinh hoạt hằng ngày, bạn thấy khó khăn với việc nào dưới đây?',
    dexa:'Bạn đã từng đi đo mật độ xương (DEXA) chưa?',
    tscore:'Chỉ số T-score (kết quả DEXA)'
  };
  var O = {
    mankinh_som:'Đã mãn kinh sớm, trước tuổi 45', mankinh_catbt:'Đã cắt buồng trứng / mãn kinh do điều trị',
    cao_ro:'Có, thấp đi rõ rệt / lưng còng nhiều', cao_nhe:'Có, thấp đi / còng hơn một chút',
    gay_1:'Có, 1 lần', gay_2:'Có, từ 2 lần trở lên', bome_co:'Có',
    yt_thuoc:'Hút thuốc lá thường xuyên', yt_ruou:'Uống rượu/bia nhiều, thường xuyên',
    yt_corti:'Dùng thuốc corticoid ("đề-xa", kháng viêm khớp/hen…) kéo dài trên 3 tháng',
    yt_benh:'Có bệnh: viêm khớp dạng thấp, tiểu đường, cường giáp, bệnh tiêu hoá hấp thu kém',
    yt_canxi:'Ít ra nắng / ít uống sữa, ít ăn thực phẩm giàu canxi',
    tap_0:'0 buổi — hầu như không tập', tap_3:'3 buổi trở lên', sarc_none:'Không khó khăn việc nào ở trên'
  };

  var A = {}; // đáp án

  // Định nghĩa các bước. type: intro | single | multi | number | contact | result
  var steps = [
    {type:'intro'},
    {type:'single', key:T.gioi, q:'Giới tính của bạn?', opts:['Nam','Nữ']},
    {type:'number', key:T.tuoi, q:'Bạn bao nhiêu tuổi?', hint:'Có thể kiểm tra hộ bố/mẹ — nhập tuổi người được kiểm tra.', unit:'tuổi', min:15, max:120},
    {type:'single', key:T.mankinh, q:'Bạn đã mãn kinh chưa?', hint:'Câu này dành cho nữ.',
      opts:['Chưa mãn kinh','Đã mãn kinh sau tuổi 45', O.mankinh_som, O.mankinh_catbt],
      showIf:function(){return A[T.gioi]==='Nữ';}},
    {type:'number', key:T.cannang, q:'Cân nặng hiện tại của bạn?', hint:'Nhập số kg, ví dụ 48.', unit:'kg', min:25, max:200},
    {type:'single', key:T.chieucao, q:T.chieucao,
      opts:['Không, vẫn như cũ', O.cao_nhe, O.cao_ro, 'Không để ý / không rõ']},
    {type:'single', key:T.gaytxuong, q:T.gaytxuong, opts:['Chưa bao giờ', O.gay_1, O.gay_2]},
    {type:'single', key:T.bome, q:T.bome, opts:['Không / không rõ', O.bome_co]},
    {type:'multi', key:T.yeuto, q:'Bạn có yếu tố nào sau đây? (chọn tất cả đúng)',
      opts:[O.yt_thuoc, O.yt_ruou, O.yt_corti, O.yt_benh, O.yt_canxi], none:'Không có yếu tố nào ở trên'},
    {type:'single', key:T.tapluyen, q:T.tapluyen, opts:[O.tap_0, '1–2 buổi', O.tap_3]},
    {type:'multi', key:T.sarcf, q:'Bạn thấy khó khăn với việc nào dưới đây? (chọn tất cả)',
      opts:['Xách một vật nặng khoảng 5kg (túi gạo, làn đi chợ)','Đi bộ trong phòng / trong nhà',
        'Đứng dậy khỏi ghế hoặc giường','Leo 10 bậc cầu thang','Tôi đã bị ngã ít nhất 1 lần trong 12 tháng qua'],
      none:O.sarc_none},
    {type:'single', key:T.dexa, q:T.dexa,
      opts:['Chưa bao giờ','Có, trên 2 năm trước','Có, trong vòng 2 năm gần đây']},
    {type:'dexaresult', showIf:function(){return (A[T.dexa]||'').indexOf('Có')===0;}},
    {type:'contact'},
    {type:'result'}
  ];

  var idx = 0;
  var body = document.getElementById('lxqBody');
  var prog = document.getElementById('lxqProg');

  function visible(i){ var s=steps[i]; return !s.showIf || s.showIf(); }
  function totalQ(){ var n=0; for(var i=0;i<steps.length;i++){var t=steps[i].type; if(t!=='intro'&&t!=='result'&&visible(i))n++;} return n; }
  function qIndex(){ var n=0; for(var i=0;i<=idx&&i<steps.length;i++){var t=steps[i].type; if(t!=='intro'&&t!=='result'&&visible(i))n++;} return n; }

  function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

  function render(){
    while(!visible(idx)) idx += (idx>0?1:1); // bỏ bước ẩn
    var s = steps[idx];
    var tot = totalQ();
    prog.style.width = (s.type==='intro'?4 : s.type==='result'?100 : Math.round(qIndex()/tot*100)) + '%';
    if(s.type==='intro')     return renderIntro();
    if(s.type==='dexaresult')return renderDexaResult();
    if(s.type==='contact')   return renderContact();
    if(s.type==='result')    return; // xử lý riêng khi submit
    renderQuestion(s);
  }

  function renderIntro(){
    body.innerHTML =
      '<p class="lxq-eyebrow">Bài tự kiểm tra · 2 phút</p>'+
      '<h2 class="lxq-h1">Xương của bạn (hay của bố mẹ) đang thầm lặng yếu đi đến đâu?</h2>'+
      '<p class="lxq-lead">Loãng xương &amp; mất cơ không đau — đến khi gãy mới biết. '+
      'Trả lời nhanh 11 câu để biết mình đang ở mức nguy cơ nào và nên bắt đầu làm gì.</p>'+
      '<div class="lxq-nav"><button class="lxq-btn primary" id="lxqStart">Bắt đầu kiểm tra →</button></div>'+
      trustHTML();
    document.getElementById('lxqStart').onclick=function(){ idx++; render(); };
  }

  function renderQuestion(s){
    var chosen = A[s.key];
    var h = '<p class="lxq-eyebrow">Câu '+qIndex()+' / '+totalQ()+'</p>';
    if(s.type==='number'){
      h += '<p class="lxq-q">'+esc(s.q)+'</p>'+(s.hint?'<p class="lxq-hint">'+esc(s.hint)+'</p>':'')+
        '<div class="lxq-field" id="lxqF"><input type="number" inputmode="numeric" id="lxqNum" '+
        'min="'+s.min+'" max="'+s.max+'" placeholder="Nhập '+esc(s.unit)+'" value="'+(chosen?esc(chosen):'')+'">'+
        '<div class="lxq-err">Vui lòng nhập số hợp lệ ('+s.min+'–'+s.max+' '+esc(s.unit)+').</div></div>';
    } else {
      h += '<p class="lxq-q">'+esc(s.q)+'</p>'+(s.hint?'<p class="lxq-hint">'+esc(s.hint)+'</p>':'');
      var list = s.opts.concat(s.none?[s.none]:[]);
      h += '<div class="lxq-opts">';
      for(var i=0;i<list.length;i++){
        var v=list[i], on=false;
        if(s.type==='multi'){ on = (chosen||[]).indexOf(v)>=0; }
        else { on = chosen===v; }
        h += '<label class="lxq-opt'+(on?' on':'')+'"><input type="'+(s.type==='multi'?'checkbox':'radio')+
          '" name="lxqo" value="'+esc(v)+'"'+(on?' checked':'')+'><span>'+esc(v)+'</span></label>';
      }
      h += '</div>';
    }
    h += '<div class="lxq-nav">'+
      '<button class="lxq-btn ghost" id="lxqBack">←</button>'+
      '<button class="lxq-btn primary" id="lxqNext">Tiếp theo →</button></div>';
    body.innerHTML = h;

    document.getElementById('lxqBack').onclick=goBack;
    document.getElementById('lxqNext').onclick=function(){ nextFromQuestion(s); };

    // tương tác chọn
    var opts=body.querySelectorAll('.lxq-opt');
    for(var k=0;k<opts.length;k++){
      opts[k].querySelector('input').onchange=function(e){
        var val=e.target.value;
        if(s.type==='multi'){
          var noneVal=s.none;
          var cur=A[s.key]||[];
          if(val===noneVal){ cur = e.target.checked?[noneVal]:[]; }
          else { cur = cur.filter(function(x){return x!==noneVal;});
                 if(e.target.checked) cur.push(val); else cur=cur.filter(function(x){return x!==val;}); }
          A[s.key]=cur;
          // refresh trạng thái "on" + bỏ tick none nếu chọn cái khác
          syncMulti(s);
        } else {
          A[s.key]=val; syncSingle();
          setTimeout(function(){ nextFromQuestion(s); },180); // radio: tự sang câu sau
        }
      };
    }
  }
  function syncSingle(){ var os=body.querySelectorAll('.lxq-opt');
    for(var i=0;i<os.length;i++){ os[i].classList.toggle('on', os[i].querySelector('input').checked); } }
  function syncMulti(s){ var os=body.querySelectorAll('.lxq-opt'); var cur=A[s.key]||[];
    for(var i=0;i<os.length;i++){ var inp=os[i].querySelector('input');
      inp.checked = cur.indexOf(inp.value)>=0; os[i].classList.toggle('on', inp.checked); } }

  function nextFromQuestion(s){
    if(s.type==='number'){
      var el=document.getElementById('lxqNum'); var n=parseFloat(el.value);
      if(isNaN(n)||n<s.min||n>s.max){ document.getElementById('lxqF').classList.add('bad'); el.focus(); return; }
      A[s.key]=String(n);
    } else if(s.type==='multi'){
      // multi cho phép không chọn? yếu tố/sarcf: nên chọn ít nhất 1 (kể cả "không có")
      if(!A[s.key]||A[s.key].length===0){ // nhắc chọn "không có" nếu bỏ trống
        A[s.key]=[]; // vẫn cho qua — coi như không có yếu tố
      }
    } else {
      if(!A[s.key]) return; // radio bắt buộc
    }
    idx++; render();
  }

  function goBack(){ idx--; while(idx>0 && !visible(idx)) idx--; render(); }

  function renderContact(){
    prog.style.width='92%';
    body.innerHTML =
      '<p class="lxq-eyebrow">Bước cuối</p>'+
      '<h2 class="lxq-h1">Xem kết quả &amp; nhận nhận xét riêng từ Bác sĩ Chúc</h2>'+
      '<p class="lxq-lead">Bác sĩ sẽ đọc bài của bạn và gửi lời khuyên cá nhân hoá qua email.</p>'+
      field('lxqTen','Họ và tên','text','VD: Nguyễn Văn A','Vui lòng nhập họ tên.')+
      field('lxqEmail','Email','email','ten@email.com','Email chưa đúng định dạng (thiếu @ hoặc đuôi).')+
      field('lxqSdt','Số điện thoại / Zalo <span style="color:#9ca3af;font-weight:400">(không bắt buộc)</span>','tel','VD: 0912345678','SĐT phải 10–11 số, bắt đầu bằng 0.')+
      '<div class="lxq-nav">'+
        '<button class="lxq-btn ghost" id="lxqBack">←</button>'+
        '<button class="lxq-btn primary" id="lxqSubmit">Xem kết quả của tôi →</button></div>'+
      trustHTML();
    document.getElementById('lxqBack').onclick=goBack;
    document.getElementById('lxqSubmit').onclick=submit;
  }
  function renderDexaResult(){
    // Bẫy quên dấu trừ: khách gõ "2.13" khi phiếu ghi −2.13 → máy chấm 🟢 ẢO.
    // → tách DẤU (bắt buộc chọn) khỏi TRỊ SỐ (luôn nhập số dương).
    var ts = A[T.tscore]||'', tsN = parseFloat(ts), sign = '', absV = '';
    if(ts!=='' && !isNaN(tsN)){ sign = tsN<0 ? '-' : '+'; absV = String(Math.abs(tsN)); }
    body.innerHTML =
      '<p class="lxq-eyebrow">Câu '+qIndex()+' / '+totalQ()+'</p>'+
      '<p class="lxq-q">Bạn đã đo DEXA — cho bác sĩ biết kết quả nhé</p>'+
      '<p class="lxq-hint">Điền chỉ số T-score nếu bạn nhớ (thường ghi trong phiếu kết quả). '+
      'Có con số thật, bác sĩ đánh giá chính xác hơn nhiều. Không bắt buộc — bỏ trống cũng được.</p>'+
      '<div class="lxq-field" id="lxqTsSF"><label>Trên phiếu, T-score là số ÂM (có dấu −) hay DƯƠNG?</label>'+
      '<div class="lxq-sign">'+
        '<button type="button" id="lxqSigNeg"'+(sign==='-'?' class="on"':'')+'><b>−</b> Số âm (VD: −2.6)</button>'+
        '<button type="button" id="lxqSigPos"'+(sign==='+'?' class="on"':'')+'><b>+</b> Số dương (VD: +0.5)</button></div>'+
      '<div class="lxq-err">Bạn đã nhập chỉ số — hãy chọn dấu âm hay dương (đa số phiếu là số âm).</div></div>'+
      '<div class="lxq-field" id="lxqTsF"><label for="lxqTs">Chỉ số T-score thấp nhất (nếu nhớ)</label>'+
      '<input id="lxqTs" type="number" step="0.1" min="0" max="6" inputmode="decimal" placeholder="VD: 2.6" value="'+esc(absV)+'">'+
      '<div class="lxq-err">Nhập số trong khoảng 0 đến 6 (VD: 2.6).</div></div>'+
      '<div class="lxq-nav">'+
        '<button class="lxq-btn ghost" id="lxqBack">←</button>'+
        '<button class="lxq-btn primary" id="lxqNext">Tiếp theo →</button></div>';
    var bNeg=document.getElementById('lxqSigNeg'), bPos=document.getElementById('lxqSigPos');
    function pick(s){ sign=s; bNeg.classList.toggle('on',s==='-'); bPos.classList.toggle('on',s==='+');
      document.getElementById('lxqTsSF').classList.remove('bad'); }
    bNeg.onclick=function(){pick('-');}; bPos.onclick=function(){pick('+');};
    document.getElementById('lxqBack').onclick=goBack;
    document.getElementById('lxqNext').onclick=function(){
      var el=document.getElementById('lxqTs'), v=el.value.trim();
      if(v===''){ A[T.tscore]=''; idx++; render(); return; }   // bỏ trống = không nhớ, hợp lệ
      var n=parseFloat(v);
      if(isNaN(n)||Math.abs(n)>6){ document.getElementById('lxqTsF').classList.add('bad'); return; }
      if(n<0){ pick('-'); n=Math.abs(n); el.value=String(n); } // khách tự gõ dấu trừ trong ô số → nhận luôn
      if(!sign){ document.getElementById('lxqTsSF').classList.add('bad'); return; } // có trị số thì PHẢI chọn dấu
      A[T.tscore]=String(sign==='-'?-n:n);
      idx++; render();
    };
  }
  function field(id,label,type,ph,err){
    return '<div class="lxq-field" id="'+id+'F"><label for="'+id+'">'+label+'</label>'+
      '<input id="'+id+'" type="'+type+'" placeholder="'+ph+'" autocomplete="'+(type==='email'?'email':type==='tel'?'tel':'name')+'">'+
      '<div class="lxq-err">'+err+'</div></div>';
  }

  function submit(){
    var ten=document.getElementById('lxqTen').value.trim();
    var email=document.getElementById('lxqEmail').value.trim();
    var sdt=document.getElementById('lxqSdt').value.trim();
    var ok=true;
    if(!ten){ bad('lxqTenF'); ok=false; } else good('lxqTenF');
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
      setErr('lxqEmailF','Email chưa đúng định dạng (thiếu @ hoặc đuôi).'); bad('lxqEmailF'); ok=false;
    } else {
      var fix=emailFix(email);
      if(fix && email.toLowerCase()!==window.__emailKeep){
        setErr('lxqEmailF','Email có vẻ gõ nhầm. Ý bạn là <b>'+esc(fix)+'</b>? '+
          '<a href="#" id="lxqFix" style="color:#0f766e;font-weight:700">Sửa lại</a> · '+
          '<a href="#" id="lxqKeep" style="color:#6b7280">tôi chắc chắn email đúng</a>');
        bad('lxqEmailF');
        document.getElementById('lxqFix').onclick=function(ev){ ev.preventDefault();
          document.getElementById('lxqEmail').value=fix; good('lxqEmailF'); };
        document.getElementById('lxqKeep').onclick=function(ev){ ev.preventDefault();
          window.__emailKeep=email.toLowerCase(); good('lxqEmailF'); };
        ok=false;
      } else good('lxqEmailF');
    }
    if(sdt && !/^0\d{9,10}$/.test(sdt.replace(/\s/g,''))){ bad('lxqSdtF'); ok=false; } else good('lxqSdtF');
    if(!ok) return;

    A[T.ten]=ten; A[T.email]=email; A[T.sdt]=sdt;

    var btn=document.getElementById('lxqSubmit');
    btn.disabled=true; btn.innerHTML='<span class="lxq-spin"></span>Đang gửi…';

    var payload={ key:SECRET, action:'submit', data:A };
    var done=false, finish=function(){ if(done)return; done=true; showResult(); };
    // POST text/plain → không kích hoạt preflight CORS; no-cors → không đọc phản hồi (đã chấm điểm phía JS)
    try{
      fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify(payload)})
        .then(finish).catch(finish);
    }catch(e){ finish(); }
    setTimeout(finish,4000); // an toàn: dù mạng chậm vẫn hiện kết quả
  }
  function bad(id){ document.getElementById(id).classList.add('bad'); }
  function good(id){ document.getElementById(id).classList.remove('bad'); }
  function setErr(fid,html){ var e=document.querySelector('#'+fid+' .lxq-err'); if(e) e.innerHTML=html; }

  // Dò lỗi đánh máy tên miền email (gmail.co, gmai.com, gmial.com, yahoo.con…)
  var GOOD_DOMAINS=['gmail.com','yahoo.com','yahoo.com.vn','hotmail.com','outlook.com',
    'outlook.com.vn','icloud.com','email.com','fpt.edu.vn'];
  function lev(a,b){ var m=a.length,n=b.length,d=[],i,j;
    for(i=0;i<=m;i++)d[i]=[i]; for(j=0;j<=n;j++)d[0][j]=j;
    for(i=1;i<=m;i++)for(j=1;j<=n;j++){ var c=a[i-1]===b[j-1]?0:1;
      d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+c); }
    return d[m][n]; }
  // Đuôi tên miền (TLD) hợp lệ phổ biến — đuôi ngoài danh sách này coi là gõ nhầm
  var GOOD_TLDS={com:1,net:1,org:1,edu:1,gov:1,mil:1,int:1,info:1,biz:1,name:1,pro:1,
    io:1,co:1,me:1,ai:1,app:1,dev:1,tech:1,site:1,online:1,store:1,cloud:1,email:1,live:1,xyz:1,
    tv:1,cc:1,asia:1,vn:1,us:1,uk:1,jp:1,cn:1,kr:1,de:1,fr:1,au:1,ca:1,in:1,id:1,ph:1,th:1,
    sg:1,my:1,hk:1,tw:1,ru:1,es:1,it:1,nl:1,se:1,no:1,br:1,mx:1};
  function emailFix(email){
    var at=email.lastIndexOf('@'); if(at<1) return null;
    var local=email.slice(0,at), dom=email.slice(at+1).toLowerCase();
    if(GOOD_DOMAINS.indexOf(dom)>=0) return null;      // đã đúng
    // Gmail CHỈ có gmail.com — mọi gmail.* / gmai. khác đều gõ nhầm
    if(/^gmail\.[a-z.]+$/.test(dom) && dom!=='gmail.com') return local+'@gmail.com';
    // Typo nhà cung cấp phổ biến (yahoo.con, hotmai.com…)
    var best=null,bd=99;
    for(var i=0;i<GOOD_DOMAINS.length;i++){ var d=lev(dom,GOOD_DOMAINS[i]); if(d<bd){bd=d;best=GOOD_DOMAINS[i];} }
    if(best && bd>0 && bd<=2) return local+'@'+best;
    // Đuôi TLD không tồn tại (drchuc.con, abc.vom…) → gợi ý đổi đuôi thành .com
    var parts=dom.split('.'), tld=parts[parts.length-1];
    if(parts.length>=2 && !GOOD_TLDS[tld]){ parts[parts.length-1]='com'; return local+'@'+parts.join('.'); }
    return null;
  }

  /* ===== CHẤM ĐIỂM (bản JS — khớp chamDiem_ trong .gs) ===== */
  function score(){
    function has(t,n){ var v=A[t]; if(!v)return false; if(v.join)return v.join(' | ').indexOf(n)!==-1; return String(v).indexOf(n)!==-1; }
    function val(t){ return A[t]!=null?String(A[t]):''; }
    var tuoi=parseFloat(val(T.tuoi))||0, cn=parseFloat(val(T.cannang))||0, d=0, coDo=false;
    var osta=null, soYT=0; // OSTA thô + đếm nhóm yếu tố ngoài OSTA (xét tổ hợp ép CAO)
    // KHÔNG Math.floor: floor biến −0.2 thành −1 (thổi điểm oan) và đẩy −4.0 khỏi nhóm nặng
    if(tuoi>0&&cn>0){ osta=(cn-tuoi)*0.2; if(osta<=-4){d+=4;coDo=true;} else if(osta<=-1)d+=2; }
    var g=val(T.gaytxuong); if(g===O.gay_1){d+=2;coDo=true;soYT++;} if(g===O.gay_2){d+=3;coDo=true;soYT++;}
    if(val(T.bome)===O.bome_co){d+=2;soYT++;}
    var c=val(T.chieucao); if(c===O.cao_ro){d+=2;coDo=true;soYT++;} if(c===O.cao_nhe){d+=1;soYT++;}
    if(has(T.yeuto,'corticoid')){d+=2;coDo=true;soYT++;}
    if(has(T.yeuto,'Hút thuốc')){d+=1;soYT++;} if(has(T.yeuto,'rượu')){d+=1;soYT++;}
    if(has(T.yeuto,'viêm khớp dạng thấp')){d+=1;soYT++;} if(has(T.yeuto,'Ít ra nắng')){d+=1;soYT++;}
    var mk=val(T.mankinh); if(mk===O.mankinh_som||mk===O.mankinh_catbt){d+=2;soYT++;}
    var tp=val(T.tapluyen); if(tp===O.tap_0)d+=1; if(tp===O.tap_3)d-=1;
    var sc=A[T.sarcf]||[], cnt=0, opts=['Xách một vật nặng','Đi bộ trong phòng','Đứng dậy khỏi ghế','Leo 10 bậc','bị ngã ít nhất 1 lần'];
    if(sc.indexOf(O.sarc_none)===-1){ for(var i=0;i<opts.length;i++){ for(var j=0;j<sc.length;j++){ if(sc[j].indexOf(opts[i])!==-1){cnt++;break;} } } }
    var matCo=cnt>=2; if(matCo){d+=2;soYT++;}
    // TỔ HỢP: OSTA nhóm trung bình (≤ −1) + ≥2 nhóm yếu tố khác → ép CAO (khớp chamDiem_ trong .gs)
    if(osta!==null&&osta<=-1&&soYT>=2)coDo=true;
    if(d<0)d=0;

    // T-score DEXA (chẩn đoán vàng) ghi đè kết quả sàng lọc
    var tsRaw=val(T.tscore), ts=parseFloat(tsRaw);
    var tang,mau,note;
    if(tsRaw!==''&&!isNaN(ts)){
      if(ts<=-2.5){ tang='ĐÃ CÓ LOÃNG XƯƠNG'; mau='#dc2626';
        note='Kết quả DEXA của bạn (T-score '+ts+') cho thấy <b>đã loãng xương</b>. Đây là lúc cần một kế hoạch điều trị &amp; tập luyện bài bản cùng bác sĩ — đừng chờ đến khi gãy.'+(matCo?' Bạn cũng có dấu hiệu mất cơ, càng cần chú ý phòng té ngã.':'');
        return {d:d,tang:tang,mau:mau,note:note};
      }
      if(ts<=-1.0){ tang='THIẾU XƯƠNG (tiền loãng xương)'; mau='#d97706';
        note='DEXA của bạn (T-score '+ts+') ở mức <b>thiếu xương (osteopenia)</b> — chưa loãng xương nhưng đã dưới chuẩn. Can thiệp ngay bằng tập kháng lực + đủ đạm + canxi/vitamin D có thể chặn đứng diễn tiến.'+(matCo?' Kèm dấu hiệu mất cơ.':'');
        return {d:d,tang:tang,mau:mau,note:note};
      }
      // ts > -1.0: mật độ xương bình thường → hạ nhẹ, vẫn xét yếu tố khác
      note='Tin tốt: DEXA của bạn (T-score '+ts+') cho thấy <b>mật độ xương bình thường</b>. Hãy duy trì tập kháng lực, đủ đạm, canxi/vitamin D và đo lại định kỳ.'+(matCo?' Lưu ý dấu hiệu sức cơ đi xuống.':'');
      return {d:d, tang:'MẬT ĐỘ XƯƠNG BÌNH THƯỜNG', mau:'#059669', note:note};
    }

    if(coDo||d>=6){ tang='NGUY CƠ CAO'; mau='#dc2626';
      note='Bạn có yếu tố nguy cơ đáng lưu ý. Nên <b>đo mật độ xương (DEXA)</b> sớm và trao đổi với bác sĩ'+(matCo?', đồng thời đánh giá tình trạng mất cơ / dễ té ngã.':'.')+' Đừng chờ đến khi đau hay gãy.';
    } else if(d>=3){ tang='NGUY CƠ TRUNG BÌNH'; mau='#d97706';
      note='Bạn có một vài yếu tố cần theo dõi. Nên <b>cân nhắc đo DEXA trong 6–12 tháng tới</b>, và bắt đầu ngay: tập kháng lực đều + ăn đủ đạm + canxi/vitamin D.'+(matCo?' Có dấu hiệu sức cơ đi xuống.':'');
    } else { tang='NGUY CƠ THẤP'; mau='#059669';
      note='Hiện bạn ở mức tốt. Hãy <b>duy trì</b>: tập kháng lực đều đặn, ăn đủ đạm, đủ canxi và vitamin D (ra nắng). Kiểm tra lại định kỳ.';
    }
    return {d:d,tang:tang,mau:mau,note:note};
  }

  function showResult(){
    prog.style.width='100%';
    var r=score();
    body.innerHTML =
      '<p class="lxq-eyebrow">Đánh giá nhanh của bạn</p>'+
      '<span class="lxq-badge" style="background:'+r.mau+'22;color:'+r.mau+'">'+r.tang+'</span>'+
      '<div class="lxq-gauge" style="color:'+r.mau+'">'+r.d+'<span style="font-size:18px;color:var(--muted);font-weight:600"> điểm nguy cơ</span></div>'+
      '<div class="lxq-result-note">'+r.note+'</div>'+
      '<p class="lxq-lead" style="margin-bottom:14px">Đây mới là <b>kết quả sàng lọc nhanh</b>. 📩 <b>Bác sĩ Chúc sẽ đọc kỹ bài của bạn và gửi PHÂN TÍCH CHI TIẾT + lời khuyên riêng qua email</b> bạn vừa nhập — nhớ kiểm tra cả mục Spam/Quảng cáo.</p>'+
      '<a class="lxq-cta" href="'+CTA_URL+'" target="_blank" rel="noopener">Đọc tiếp: 7 dấu hiệu mất cơ âm thầm &amp; cách phòng →</a>'+
      authorHTML();
  }

  function trustHTML(){
    return '<div class="lxq-trust">'+
      '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0f766e" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>'+
      '<span>Thông tin của bạn được bảo mật, chỉ Bác sĩ Chúc đọc để phản hồi riêng. Đây là công cụ sàng lọc, không thay thế thăm khám.</span></div>';
  }
  function authorHTML(){
    return '<div class="lxq-author"><span>🩺</span><span>Bài kiểm tra do <b>Bác sĩ Nguyễn Xuân Chúc</b> biên soạn dựa trên thang OSTA &amp; SARC-F.</span></div>';
  }

  render();
})();
</script>
